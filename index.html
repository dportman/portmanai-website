<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portman AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1a56db;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
    }

    .divider {
      font-weight: 300;
      opacity: 0.5;
      margin: 0 0.3em;
    }
  </style>
</head>
<body>
  <h1>Portman <span class="divider">//</span> AI</h1>
</body>
</html>
